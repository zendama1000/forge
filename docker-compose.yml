# 単体起動:   docker compose run --rm forge bash
# 複数同時:   ./forge-docker.sh start <project-path>  (推奨)
#
# サブスクリプション認証: コンテナ内で claude login を実行

services:
  forge:
    build: .
    env_file:
      - .env
    volumes:
      - ./projects:/workspace/work
    stdin_open: true
    tty: true
    user: "1000:1000"
