services:
  # 単体起動: docker compose run --rm forge bash
  # 並行実行: 別プロジェクトは別ターミナルで docker run を使用（下記参照）
  #
  # 並行実行例（docker run 推奨）:
  #   docker run --rm -it -e ANTHROPIC_API_KEY=$ANTHROPIC_API_KEY -e GITHUB_TOKEN=$GITHUB_TOKEN \
  #     -v C:/dev/projects/uranai:/workspace/work forge-harness bash
  #   docker run --rm -it -e ANTHROPIC_API_KEY=$ANTHROPIC_API_KEY -e GITHUB_TOKEN=$GITHUB_TOKEN \
  #     -v C:/dev/projects/fortune:/workspace/work forge-harness bash
  forge:
    build: .
    env_file:
      - .env
    volumes:
      - ./projects:/workspace/work
    stdin_open: true
    tty: true
